<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Reading App (Local Version)</title>
<style>
body { font-family: sans-serif; margin: 0; padding: 20px; }
#loading-overlay { position: fixed; inset:0; background:#fff; display:flex; align-items:center; justify-content:center; }
.card { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
button { padding:6px 10px; margin-top:5px; }
</style>
</head>
<body>

<div id="loading-overlay">Loading...</div>

<h1>読書アプリ（ローカル版）</h1>

<div>
  <input id="title" placeholder="本のタイトル">
  <button onclick="addBook()">追加</button>
</div>

<div id="list"></div>

<script>
// データ
let books = [];
let series = [];
let tagMaster = [];

// ローカル保存
function saveData(){
  const data = { books, series, tags: tagMaster };
  localStorage.setItem('readingAppData', JSON.stringify(data));
}

function loadLocalData(){
  try{
    const raw = localStorage.getItem('readingAppData');
    if(!raw) return;
    const data = JSON.parse(raw);
    books = data.books || [];
    series = data.series || [];
    tagMaster = data.tags || [];
  }catch(e){
    console.error(e);
    books = [];
    series = [];
    tagMaster = [];
  }
}

function scheduleSave(){
  saveData();
}

// UI
function render(){
  const el = document.getElementById('list');
  el.innerHTML = books.map(b => `
    <div class="card">
      ${b.title}
      <button onclick="removeBook(${b.id})">削除</button>
    </div>
  `).join('');
}

// 操作
function addBook(){
  const input = document.getElementById('title');
  const title = input.value.trim();
  if(!title) return;

  books.unshift({
    id: Date.now(),
    title
  });

  input.value = '';
  scheduleSave();
  render();
}

function removeBook(id){
  books = books.filter(b => b.id !== id);
  scheduleSave();
  render();
}

// 起動
function init(){
  loadLocalData();
  document.getElementById('loading-overlay').style.display='none';
  render();
}

init();
</script>

</body>
</html>
