<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 読書ログ</title>
<style>
:root{--accent:#1D9E75;--accent-dark:#0F6E56;--accent-bg:#E1F5EE;--accent-text:#085041}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif;font-size:14px;color:#3d2c24;background:#f5f5f3}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #e0e0d8;background:#fff;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:600}
.nav-area{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.nb{background:none;border:none;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666}
.nb.act{background:#eee;color:#111;font-weight:500}
.nb:hover{background:#f0f0ee}
.view-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:4px 9px;cursor:pointer;font-size:13px;line-height:1}
.view-btn.act{background:#eee;border-color:#bbb}
.pg{display:none;padding:14px 16px;background:#f5f5f3;min-height:calc(100vh - 52px)}
.pg.on{display:block}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:8px}
.between{justify-content:space-between}
.wrap{flex-wrap:wrap}
.btn{background:none;border:1px solid #ccc;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:#333}
.btn:hover{background:#f0f0ee}
.btn-pri{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-pri:hover{background:var(--accent-dark)}
.btn-sm{padding:4px 8px;font-size:12px}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.btn-wish{background:none;border:1px solid #ccc;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:#333}
.sinp{border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:13px;background:#fff;color:#333}
.chip{display:inline-flex;align-items:center;font-size:12px;padding:4px 10px;border-radius:16px;font-weight:500;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.chip-on{color:#fff}
.chip-off{background:none!important;border-color:#ccc!important;color:#555!important}
.cf{font-size:12px;padding:4px 10px;border-radius:16px;cursor:pointer;border:1px solid #ccc;color:#555;white-space:nowrap;display:inline-flex;align-items:center;user-select:none}
.cf.mode-and{color:#fff;border-color:transparent}
.cf.mode-or{color:#fff;outline:2px solid #ffb74d;outline-offset:1px}
.cf.mode-not{background:#A32D2D!important;color:#fff!important;border-color:#A32D2D!important;text-decoration:line-through}
.fg{display:flex;flex-wrap:wrap;gap:5px}
.wbadge{font-size:11px;padding:2px 7px;border-radius:99px;background:#E0E0DA;color:#555550;font-weight:500}
.cnt{font-size:11px;color:#888;white-space:nowrap}
.bitem{border:1px solid #e5e5e0;border-radius:12px;padding:10px 14px;cursor:pointer;margin-bottom:7px}
.bitem.normal{background:#fff}
.bitem.wish{background:#E8E8E5}
.bitem:hover{opacity:.82}
.bt{font-weight:500;font-size:14px;margin-bottom:2px}
.brow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px}
.bdate{font-size:12px;color:#888}
/* 背表紙 */
.spine-section{margin-bottom:0}
.spine-row{display:flex;gap:6px;align-items:flex-end;padding:10px 0 0}
.shelf-board{height:5px;background:#c8a060;border-radius:2px;margin-bottom:4px}
.spine-book{display:flex;flex-direction:column;align-items:center;justify-content:space-between;border-radius:3px 5px 5px 3px;cursor:pointer;padding:10px 5px 8px;position:relative;flex-shrink:0;transition:transform .15s,box-shadow .15s;box-shadow:1px 2px 4px rgba(0,0,0,.16)}
.spine-book:hover{transform:translateY(-5px);box-shadow:2px 6px 12px rgba(0,0,0,.2)}
.spine-title{writing-mode:vertical-rl;text-orientation:mixed;font-size:12px;font-weight:500;color:#fff;white-space:normal;word-break:break-all;text-shadow:0 1px 2px rgba(0,0,0,.3);flex:1;line-height:1.4;overflow:hidden}
.spine-fav{font-size:11px;margin-top:4px;flex-shrink:0;writing-mode:vertical-rl;text-orientation:mixed;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);letter-spacing:.05em}
.spine-wish{position:absolute;inset:0;border-radius:3px 5px 5px 3px;background:repeating-linear-gradient(45deg,rgba(255,255,255,0),rgba(255,255,255,0) 4px,rgba(255,255,255,.12) 4px,rgba(255,255,255,.12) 6px);pointer-events:none}
/* 統計・カレンダー */
.cbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.clbl{width:36px;font-size:12px;color:#888;text-align:right;flex-shrink:0}
.cbg{flex:1;height:16px;background:#eee;border-radius:99px;overflow:hidden}
.cfill{height:100%;border-radius:99px}
.cval{width:24px;font-size:12px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-head{text-align:center;font-size:11px;color:#888;padding:4px 0;font-weight:500}
.cal-cell{min-height:44px;background:#fafaf8;border-radius:6px;padding:4px;font-size:12px;border:1px solid #f0f0ee}
.cal-cell.today{border-color:var(--accent);background:#f0faf6}
.cal-cell.other-month{color:#ccc;background:#f8f8f7}
.cal-day-num{font-size:11px;color:#888;margin-bottom:2px}
.cal-count{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.cal-count:hover{background:var(--accent-dark)}
/* トグル */
.tog{position:relative;width:34px;height:19px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:99px;cursor:pointer;transition:.2s}
.tsl:before{content:"";position:absolute;width:15px;height:15px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tsl{background:var(--accent)}
.tog input:checked+.tsl:before{transform:translateX(15px)}
.sitem{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pal{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.pcol{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.pcol.sel{border-color:rgba(0,0,0,.45)}
.divider{height:1px;background:#eee;margin:10px 0}
.tag-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #eee}
.tag-row:last-of-type{border-bottom:none}
.tag-edit-box{background:#f5f5f3;border-radius:10px;padding:10px;margin-bottom:6px}
.edit-inp{width:100%;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:#333}
.memo-area{width:100%;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:#333;resize:vertical;min-height:72px;font-family:inherit}
.memo-disp{font-size:13px;background:#f5f5f3;border-radius:8px;padding:8px 10px;min-height:40px;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.vb{font-size:11px;padding:3px 8px;border-radius:99px;background:var(--accent-bg);color:var(--accent-text);font-weight:500;cursor:pointer}
.vb.unread{background:#eee;color:#888}
.sort-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:11px;color:#888;white-space:nowrap}
.sort-btn.act{background:#eee;color:#333;font-weight:500;border-color:#ccc}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mnb{background:none;border:1px solid #ddd;border-radius:8px;padding:3px 12px;cursor:pointer;font-size:15px}
.mnb:hover{background:#eee}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:18px;width:420px;max-width:95vw;max-height:85vh;overflow-y:auto;position:relative;margin-bottom:30px}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:20px;color:#888;line-height:1;padding:2px 6px;border-radius:8px}
.modal-close:hover{background:#eee}
.mt{font-size:15px;font-weight:600;margin-bottom:14px;padding-right:28px}
.fr{margin-bottom:10px}
.fl{font-size:12px;color:#888;margin-bottom:4px}
.dl{font-size:12px;color:#888;margin-bottom:4px}
.df{margin-bottom:12px}
#sync-status{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
#sync-status.ok{background:var(--accent-bg);color:var(--accent-text)}
#sync-status.saving{background:#FFF8E1;color:#7A5800}
#sync-status.error{background:#FCEBEB;color:#A32D2D}
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:14px;color:#555}
.spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading-overlay"><div class="spinner"></div><div>読書ログを読み込んでいます...</div></div>
<div class="topbar">
  <div class="logo">📚 読書ログ</div>
  <div class="nav-area" id="nav-area"></div>
  <span id="sync-status" class="ok">✓ 同期済み</span>
</div>
<div id="pages">
  <div id="pg-shelf" class="pg on"></div>
  <div id="pg-series" class="pg"></div>
  <div id="pg-stats" class="pg"></div>
  <div id="pg-settings" class="pg"></div>
  <div id="pg-detail" class="pg"></div>
  <div id="pg-series-detail" class="pg"></div>
</div>
<!-- 本を追加 -->
<div class="modal-bg" id="book-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeBookModal()">×</button>
    <div class="mt">本を追加</div>
    <div class="fr"><div class="fl">タイトル</div><input class="edit-inp" id="m-title" placeholder="例：羊と鋼の森" oninput="renderMSeriesSel()"></div>
    <div class="fr" id="m-date-wrap"><div class="fl">読了日</div><div class="row" style="gap:6px"><input class="edit-inp" id="m-date" type="date" style="flex:1"><button class="btn btn-sm" onclick="document.getElementById('m-date').value=''">クリア</button></div></div>
    <div class="fr" id="m-tags-wrap"><div class="fl">タグ</div><div id="m-tag-chips" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px"></div><input class="edit-inp" id="m-new-tag-name" placeholder="新しいタグ名..." style="margin-bottom:5px"><div class="pal" id="m-new-tag-pal"></div><button class="btn btn-sm" onclick="addTagFromModal()" style="margin-top:5px">タグを追加</button></div>
    <div class="fr" id="m-fav-wrap"><div class="fl">お気に入り度</div><div id="m-fav-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:3px"></div></div>
    <div class="fr" id="m-series-wrap"><div class="fl">シリーズ</div><select class="sinp" id="m-series-sel" style="width:100%"><option value="">シリーズに追加（任意）</option></select></div>
    <div class="fr" id="m-memo-wrap"><div class="fl">メモ</div><textarea class="memo-area" id="m-memo" placeholder="メモを入力..."></textarea></div>
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn-wish" onclick="saveBook('wish')">＋WishList</button><button class="btn-pri" onclick="saveBook('normal')">追加</button></div>
  </div>
</div>
<!-- シリーズ追加 -->
<div class="modal-bg" id="series-add-modal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('series-add-modal').classList.remove('open')">×</button>
    <div class="mt">シリーズを追加</div>
    <div class="fr"><div class="fl">シリーズタイトル</div><input class="edit-inp" id="sa-name" oninput="renderSABS()"></div>
    <div class="fr" id="sa-memo-wrap"><div class="fl">メモ</div><textarea class="memo-area" id="sa-memo" placeholder="メモを入力..."></textarea></div>
    <div class="fr">
      <div class="fl">本を追加</div>
      <input class="edit-inp" id="sa-search" placeholder="タイトルで検索..." oninput="renderSABS()" style="margin-bottom:6px">
      <div style="display:flex;gap:6px;margin-bottom:6px;width:100%"><select class="sinp" id="sa-book-sel" style="flex:1;min-width:0"></select><button class="btn btn-sm" style="flex-shrink:0;white-space:nowrap" onclick="addBookToNewSeries()">追加</button></div>
      <div id="sa-book-list"></div>
    </div>
    <div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn-pri" onclick="saveNewSeries()">作成</button></div>
  </div>
</div>
<!-- 日別読了一覧モーダル -->
<div class="modal-bg" id="day-modal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('day-modal').classList.remove('open')">×</button>
    <div class="mt" id="day-modal-title">2025-01-01 の読了</div>
    <div id="day-modal-list"></div>
  </div>
</div>

<script>
const CONFIG={DATA_URL:'data.json',SAVE_URL:'save.php',API_KEY:'MyReLog_F2026_naoichi',SAVE_DELAY_MS:800};
// 和色中心20色パレット（濃淡あり）
const PALETTE=[
  '#B52A40', // 紅
  '#9E3A5A', // 茜
  '#EB6E80', // 紅梅
  '#D2553B', // 柿
  '#E8A020', // 山吹
  '#C4A120', // 黄金
  '#7DA23A', // 若草
  '#1E7A4E', // 常磐
  '#4FA090', // 青竹
  '#3D8A9E', // 浅葱
  '#3558A0', // 群青
  '#2545A0', // 瑠璃
  '#8B6DAE', // 藤
  '#6B4D8A', // 江戸紫
  '#7D6E98', // 紫苑
  '#C4A882', // 白茶
  '#7A5C35', // 煎茶
  '#5A5050', // 鉄
  '#8A7E78', // 鼠
  '#4A3B30', // 焦茶
];
const DEF_COLORS=['#7B5EA7','#D45D79','#4A90A4','#5B8C5A','#C47C2B','#5A7DB5','#9B4E8E','#3D8B8B'];
const FAV_OPTS=[{v:1,l:'★'},{v:2,l:'★★'},{v:3,l:'★★★'},{v:4,l:'👑'}];
const FAV_C={1:'#EF9F27',2:'#EF9F27',3:'#EF9F27',4:'#E6C200'};
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const WDAYS=['日','月','火','水','木','金','土'];

let books=[],tagMaster=[],series=[],features=[];
let tagFilterModes={};
let aTy='',aFv=0,sK='date',sD='desc';
// -- 永続化するUI状態 --
let vM=localStorage.getItem('vM')||'list';
let spineGradMode=localStorage.getItem('spineGradMode')||'single'; // 'single'|'grad'
// タグチップ並び順: 'freq-desc'|'freq-asc'|'name-asc'|'name-desc'
let tagChipOrder=localStorage.getItem('tagChipOrder')||'freq-desc';
// シリーズリスト（ソート設定を永続化）
let serSearch='';
let serSort=localStorage.getItem('serSort')||'name';
let serSortDir=localStorage.getItem('serSortDir')||'asc';
// 個別
let mST=[],mSF=0,mNP=0;
let curDet=null,curSer=null,prevPg='shelf',saBooks=[],statsYr=new Date().getFullYear();
let tagEditPalMap={},addPalIdx=0,saveTimer=null;
// カレンダー
let calYr=new Date().getFullYear(),calMo=new Date().getMonth()+1;
// stats→detail 経由日付
let calFromDate=null;

// フィルター状態を復元
try{const s=JSON.parse(localStorage.getItem('filters')||'{}');tagFilterModes=s.tagFilterModes||{};aTy=s.aTy||'';aFv=s.aFv||0;sK=s.sK||'date';sD=s.sD||'desc';}catch(e){}
function saveFilterState(){try{localStorage.setItem('filters',JSON.stringify({tagFilterModes,aTy,aFv,sK,sD}));}catch(e){}}

// ---------- 同期 ----------
function setSS(s,m){const el=document.getElementById('sync-status');el.className=s;el.textContent=m;}
async function loadData(){
  try{const r=await fetch(CONFIG.DATA_URL+'?t='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();books=d.books||[];tagMaster=d.tagMaster||[];series=d.series||[];features=d.features||defFeats();setSS('ok','✓ 同期済み');}
  catch(e){books=[];tagMaster=[];series=[];features=defFeats();setSS('error','⚠ 読込失敗');alert('data.json の読み込みに失敗しました。\n'+e.message);}
}
function scheduleSave(){clearTimeout(saveTimer);setSS('saving','⟳ 保存中...');saveTimer=setTimeout(doSave,CONFIG.SAVE_DELAY_MS);}
async function doSave(){try{const r=await fetch(CONFIG.SAVE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:CONFIG.API_KEY,data:{books,tagMaster,series,features}})});const j=await r.json();j.ok?setSS('ok','✓ 同期済み'):(()=>{throw new Error(j.error)})();}catch(e){setSS('error','⚠ 保存失敗');}}
function defFeats(){return[{id:'fav',name:'お気に入り度',desc:'4段階で評価を記録',on:true},{id:'tags',name:'タグ付け',desc:'本にタグを付けて分類',on:true},{id:'series',name:'シリーズ管理',desc:'続刊・シリーズをまとめる',on:true},{id:'readlog',name:'読了ログ',desc:'読んだ日付・回数を記録',on:true},{id:'stats_tag',name:'タグ別統計',desc:'タグ別グラフを表示',on:true},{id:'stats_month',name:'月別読了数',desc:'月ごとの統計を表示',on:true},{id:'wishlist',name:'ウィッシュリスト',desc:'読みたい本を管理',on:true},{id:'memo',name:'メモ欄',desc:'各ページにメモ欄を表示',on:false}];}

// ---------- ユーティリティ ----------
const feat=id=>features.find(f=>f.id===id)?.on;
const tagById=id=>tagMaster.find(t=>t.id===id);
const bookById=id=>books.find(b=>b.id===id);
function tagFreq(){const c={};books.forEach(b=>b.tagIds.forEach(id=>{c[id]=(c[id]||0)+1;}));return c;}
function sortedTags(){const f=tagFreq();return[...tagMaster].sort((a,b)=>{const d=(f[b.id]||0)-(f[a.id]||0);return d||a.name.localeCompare(b.name,'ja');});}
const today=()=>new Date().toISOString().slice(0,10);
const favHtml=fav=>{if(!fav)return'';const o=FAV_OPTS.find(x=>x.v===fav);return o?`<span style="font-size:13px;color:${FAV_C[fav]}">${o.l}</span>`:''};
const chipsHtml=ids=>ids.map(id=>{const t=tagById(id);return t?`<span class="chip chip-on" style="background:${t.color};font-size:11px">${t.name}</span>`:''}).join('');
function latestDate(b){const v=(b.dates||[]).filter(d=>d);return v.length?v.slice().sort().reverse()[0]:'';}
const readCount=b=>(b.dates||[]).filter(d=>d).length;
function countYM(yr,mo){const p=`${yr}-${String(mo).padStart(2,'0')}`;let n=0;books.filter(b=>b.type==='normal').forEach(b=>{(b.dates||[]).forEach(d=>{if(d&&d.startsWith(p))n++;});});return n;}
function countY(yr){let n=0;books.filter(b=>b.type==='normal').forEach(b=>{(b.dates||[]).forEach(d=>{if(d&&d.startsWith(String(yr)))n++;});});return n;}
function booksOnDate(dateStr){return books.filter(b=>b.type==='normal'&&(b.dates||[]).includes(dateStr));}
function seriesLatestDate(s){let best='';s.bookIds.forEach(id=>{const b=bookById(id);if(!b)return;const ld=latestDate(b);if(ld>best)best=ld;});return best;}
function spineColors(b){
  // タグが2つ以上あればそれぞれの色、1つなら同色2つ、なければデフォルト
  if(b.tagIds&&b.tagIds.length>=2){
    const t1=tagById(b.tagIds[0]),t2=tagById(b.tagIds[1]);
    if(t1&&t2)return[t1.color,t2.color];
  }
  if(b.tagIds&&b.tagIds.length===1){const t=tagById(b.tagIds[0]);if(t)return[t.color,t.color];}
  const c=DEF_COLORS[b.id%DEF_COLORS.length];return[c,c];
}
function spineColor(b){return spineColors(b)[0];}
function spineW(b){const l=b.title.length;return l<=4?32:l<=8?42:l<=14?52:62;}
function spineH(b){
  const base=155+(b.title.length>10?14:0);
  const favH=b.fav?28:0; // 縦書きお気に入り分
  return base+favH;
}
function relevanceScore(bt,sn){if(!sn)return 0;let s=0;if(bt.includes(sn))s+=20;for(const c of sn)if(bt.includes(c))s++;return s;}

// ---------- タグチップ並び替え ----------
function tagChipSorted(){
  const freq=tagFreq();
  const tags=[...tagMaster];
  if(tagChipOrder==='freq-desc')return tags.sort((a,b)=>(freq[b.id]||0)-(freq[a.id]||0)||a.name.localeCompare(b.name,'ja'));
  if(tagChipOrder==='freq-asc')return tags.sort((a,b)=>(freq[a.id]||0)-(freq[b.id]||0)||a.name.localeCompare(b.name,'ja'));
  if(tagChipOrder==='name-asc')return tags.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  if(tagChipOrder==='name-desc')return tags.sort((a,b)=>b.name.localeCompare(a.name,'ja'));
  return tags;
}
function cycleTagChipOrder(){
  const orders=['freq-desc','freq-asc','name-asc','name-desc'];
  const i=orders.indexOf(tagChipOrder);tagChipOrder=orders[(i+1)%orders.length];
  localStorage.setItem('tagChipOrder',tagChipOrder);renderSettings();
}
function tagChipOrderLabel(){
  if(tagChipOrder==='freq-desc')return '冊数↓';
  if(tagChipOrder==='freq-asc')return '冊数↑';
  if(tagChipOrder==='name-asc')return '名前↑';
  if(tagChipOrder==='name-desc')return '名前↓';
  return '冊数↓';
}

// ---------- タグフィルター ----------
function cycleTagFilter(id){
  const cur=tagFilterModes[id];
  if(!cur)tagFilterModes[id]='and';else if(cur==='and')tagFilterModes[id]='or';else if(cur==='or')tagFilterModes[id]='not';else delete tagFilterModes[id];
  saveFilterState();renderFilterChips();renderShelfList();
}
function bookPassesTagFilter(b){
  const active=Object.keys(tagFilterModes).filter(id=>tagFilterModes[id]);if(!active.length)return true;
  const and=active.filter(id=>tagFilterModes[id]==='and');const or=active.filter(id=>tagFilterModes[id]==='or');const not=active.filter(id=>tagFilterModes[id]==='not');
  if(and.length&&!and.every(id=>b.tagIds.includes(id)))return false;if(or.length&&!or.some(id=>b.tagIds.includes(id)))return false;if(not.some(id=>b.tagIds.includes(id)))return false;return true;
}

// 背表紙＋棚板レンダリング
function renderSpineShelves(list,container){
  // コンテナ幅を取得（初回は仮値、再描画で正確に）
  const cw=container.clientWidth||window.innerWidth-32||600;
  const GAP=6;
  const rows=[];let row=[],rw=0;
  for(const b of list){const w=spineW(b);const need=rw===0?w:rw+GAP+w;if(rw>0&&need>cw){rows.push(row);row=[b];rw=w;}else{row.push(b);rw=need;}}
  if(row.length)rows.push(row);
  let html='<div class="spine-section">';
  for(const r of rows){
    html+='<div class="spine-row">';
    for(const b of r){
      const [c1,c2]=spineColors(b);
      const bgStyle=
        spineGradMode==='grad'&&c1!==c2
          ?`background:linear-gradient(to bottom,${c1} 75%,${c2})`
        :spineGradMode==='split'&&c1!==c2
          ?`background:linear-gradient(to bottom,${c1} 75%,${c2} 75%)`
        :`background:${c1}`;
      const w=spineW(b),h=spineH(b),fav=b.fav?FAV_OPTS.find(o=>o.v===b.fav)?.l:'';
      const dimStyle=b.type==='wish'?'filter:brightness(0.72)':'';
      html+=`<div class="spine-book" style="${bgStyle};width:${w}px;height:${h}px;${dimStyle}" onclick="openDetail(${b.id})" title="${b.title}">${b.type==='wish'?'<div class="spine-wish"></div>':''}<div class="spine-title">${b.title}</div>${fav?`<div class="spine-fav">${fav}</div>`:''}</div>`;
    }
    html+='</div><div class="shelf-board"></div>';
  }
  html+='</div>';
  container.innerHTML=html;
}

// ---------- 統計 ----------
function renderStats(){
  const pg=document.getElementById('pg-stats');
  const freq=tagFreq(),st=sortedTags().filter(t=>freq[t.id]),max=st[0]?freq[st[0].id]:1;
  const th=feat('stats_tag')?`<div class="card"><div style="font-weight:500;margin-bottom:10px">タグ別読了数</div>${st.map(t=>`<div class="cbar-row"><span class="clbl">${t.name}</span><div class="cbg"><div class="cfill" style="width:${Math.round((freq[t.id]||0)/max*100)}%;background:${t.color}"></div></div><span class="cval">${freq[t.id]||0}</span></div>`).join('')||'<div style="font-size:13px;color:#888">データなし</div>'}</div>`:'';
  const mh=feat('stats_month')?`<div class="card"><div class="month-nav"><button class="mnb" onclick="statsYr--;renderMC()">‹</button><div style="font-weight:500;font-size:14px;min-width:60px;text-align:center" id="sy-lbl">${statsYr}年</div><button class="mnb" onclick="statsYr++;renderMC()">›</button></div><div id="mc-body"></div></div>`:'';
  const calH=`<div class="card" id="cal-card"><div class="month-nav"><button class="mnb" onclick="calPrev()">‹</button><div style="font-weight:500;font-size:14px;min-width:80px;text-align:center" id="cal-lbl">${calYr}年${calMo}月</div><button class="mnb" onclick="calNext()">›</button></div><div id="cal-grid"></div></div>`;
  pg.innerHTML=calH+th+mh||'<div style="font-size:13px;color:#888">統計機能がオフです</div>';
  if(feat('stats_month'))renderMC();
  renderCalendar();
  if(calFromDate){calFromDate=null;} // 使用済みフラグをクリア
}
function renderMC(){const lbl=document.getElementById('sy-lbl');if(lbl)lbl.textContent=statsYr+'年';const el=document.getElementById('mc-body');if(!el)return;const counts=MONTHS.map((_,i)=>countYM(statsYr,i+1)),max=Math.max(...counts,1);const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#1D9E75';el.innerHTML=counts.map((n,i)=>`<div class="cbar-row"><span class="clbl">${MONTHS[i]}</span><div class="cbg"><div class="cfill" style="width:${Math.round(n/max*100)}%;background:${accent}"></div></div><span class="cval">${n}</span></div>`).join('');}
function calPrev(){calMo--;if(calMo<1){calMo=12;calYr--;}renderCalendar();}
function calNext(){calMo++;if(calMo>12){calMo=1;calYr++;}renderCalendar();}

function renderCalendar(){
  const lbl=document.getElementById('cal-lbl');if(lbl)lbl.textContent=calYr+'年'+calMo+'月';
  const el=document.getElementById('cal-grid');if(!el)return;
  const todayStr=today();
  const firstDay=new Date(calYr,calMo-1,1).getDay(); // 0=Sun
  const lastDate=new Date(calYr,calMo,0).getDate();
  let html='<div class="cal-grid">';
  WDAYS.forEach(w=>{html+=`<div class="cal-head">${w}</div>`;});
  // 前月の空白
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell other-month"></div>`;
  for(let d=1;d<=lastDate;d++){
    const ds=`${calYr}-${String(calMo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const booksOnDay=booksOnDate(ds);const cnt=booksOnDay.length;
    const isToday=ds===todayStr;
    html+=`<div class="cal-cell ${isToday?'today':''}">
      <div class="cal-day-num">${d}</div>
      ${cnt>0?`<div class="cal-cell" onclick="openDayModal('${ds}')">`:''}
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function openDayModal(dateStr){
  const list=booksOnDate(dateStr).slice().sort((a,b)=>a.id-b.id);
  document.getElementById('day-modal-title').textContent=`${dateStr} の読了`;
  document.getElementById('day-modal-list').innerHTML=list.map(b=>`
    <div class="bitem normal" style="cursor:pointer" onclick="openDetailFromDay(${b.id})">
      <div class="bt">${b.title}</div>
      <div class="brow">${feat('tags')?chipsHtml(b.tagIds):''}${feat('fav')?favHtml(b.fav):''}</div>
    </div>`).join('')||'<div style="font-size:13px;color:#888">なし</div>';

  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
}

const ACCENT_THEMES=[
  {name:'鮮緑', accent:'#67b255', dark:'#76b966', bg:'#b3d8aa', text:'#3d6a33'},
  {name:'呉須', accent:'#004676', dark:'#195883', bg:'#326a91', text:'#ccdae3'},
  {name:'蘇芳', accent:'#9e3d3e', dark:'#a75051', bg:'#d8b1b1', text:'#5e2425'},
  {name:'古代紫', accent:'#895b8a', dark:'#946b95', bg:'#a07ba1', text:'#dbcddb'},
  {name:'鴨の羽', accent:'#007364', dark:'#198173', bg:'#4c9d92', text:'#b2d5d0'},
  {name:'朱華',accent:'#f4a57a', dark:'#f5ae87', bg:'#fbe4d7', text:'#aa7355'},
];
function applyAccent(idx){
  const t=ACCENT_THEMES[idx];if(!t)return;
  const r=document.documentElement.style;
  r.setProperty('--accent',t.accent);r.setProperty('--accent-dark',t.dark);
  r.setProperty('--accent-bg',t.bg);r.setProperty('--accent-text',t.text);

}
function initAccent(){
  const idx=parseInt(localStorage.getItem('accentIdx')||'0');applyAccent(idx);
}

// ---------- 本の個別ページ → 同名シリーズを新規作成 ----------
function createSeriesFromBook(bookId){
  const b=bookById(bookId);if(!b)return;
  const name=b.title;
  if(series.find(s=>s.name===name)){alert(`「${name}」というシリーズはすでに存在します。`);return;}
  const ns={id:'s'+Date.now(),name,bookIds:[bookId],memo:''};
  series.push(ns);curSer=ns.id;
  renderDetail();// 個別ページのシリーズ表示を更新
  scheduleSave();
  if(confirm(`シリーズ「${name}」を作成しました。シリーズページを開きますか？`)){openSerDet(ns.id);}
}

// ---------- シリーズ個別ページ → 同名の本を新規作成してシリーズに追加 ----------
function createBookFromSeries(seriesId){
  const s=series.find(x=>x.id===seriesId);if(!s)return;
  const title=s.name;
  const newBook={id:Date.now(),title,dates:[],tagIds:[],fav:0,type:'normal',memo:''};
  books.unshift(newBook);
  s.bookIds.push(newBook.id);
  scheduleSave();
  renderSerDet();// シリーズページを更新（一番下に追加されたはず）
  if(confirm(`本「${title}」を作成してシリーズに追加しました。本の個別ページを開いて詳細を編集しますか？`)){
    curDet=newBook.id;renderDetail();
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
    document.getElementById('pg-detail').classList.add('on');
    prevPg='series-detail';
  }
}

// ---------- 起動 ----------
async function loadData(){
  try{
    // 例：ローカルストレージから読むだけにする
    const saved = localStorage.getItem('readingAppData');
    if(saved){
      const data = JSON.parse(saved);
      books = data.books || [];
      series = data.series || [];
      tagMaster = data.tagMaster || [];
    }
  }catch(e){
    console.error('loadData error', e);
  }
}
  async function init(){
  initAccent();
  try{
    await loadData();
  }catch(e){
    console.error(e);
  }

  document.getElementById('loading-overlay').style.display='none';
  renderNav();
  document.getElementById('nb-shelf')?.classList.add('act');
  renderShelf();
  }
  
</script>
