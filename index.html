<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Reading App（修正版）</title>
<style>
body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5}
.card{background:#fff;border:1px solid #ddd;padding:10px;margin-bottom:10px;border-radius:6px}
input,textarea,select{width:100%;margin-top:5px;margin-bottom:5px;padding:6px}
button{padding:6px 10px;margin-top:5px}
.row{display:flex;gap:5px;flex-wrap:wrap}
.tag{
padding:4px 8px;
border-radius:999px;
background:#ddd;
fcursor:pointer;
font-size:12px;
}
.tag.on{
	background:#67b255;
	color:#fff;
}
</style>
</head>
<body>

<h1>読書アプリ</h1>
<!--絞り込み-->
<div class="card">
	<div class="row" id="filter-tags"></div>
	<button onclick="clearFilter()">解除</button>
</div>

<!-- 本追加 -->
<div class="card">
  <input id="title" placeholder="タイトル">
  <textarea id="memo" placeholder="メモ"></textarea>
  <select id="seriesSelect"></select>
  <button onclick="addBook()">追加</button>
</div>

<!-- シリーズ追加 -->
<div class="card">
  <input id="newSeries" placeholder="新しいシリーズ名">
  <button onclick="addSeries()">シリーズ作成</button>
</div>

<div id="list"></div>

<!--タグ管理画面-->
<div class="card">
  <h3>タグ管理</h3>

  <div id="tag-list"></div>

  <input id="newTagName" placeholder="タグ名">
  <button onclick="addTagMaster()">追加</button>
</div>

<script>
//最初の定義付け、初期値入力？

let books = [];
let series = [];
let tagMaster = [
	{id:"t1", name:"小説", color:"#f00"},
	{id:"t2", name:"漫画", color:"orange"}
];
let activeTags = [];

// ===== 保存 =====
function saveData(){
  localStorage.setItem('readingAppData', JSON.stringify({books, series}));
}

function loadData(){
  try{
    const d = JSON.parse(localStorage.getItem('readingAppData'));
    if(!d) return;
    books = d.books || [];
    series = d.series || [];
  }catch(e){
    books = [];
    series = [];
  }
}

function scheduleSave(){
  saveData();
}

// ===== UI(render:描画) =====
function render(){

const filtered = books.filter(b=>{
  if(activeTags.length === 0) return true;

  return activeTags.every(t => (b.tags||[]).includes(t)); //AND
  return activeTags.some(t => (b.tags||[]).includes(t)); //OR
  
});


//renderに追加するやつ
  renderSeriesSelect();
  renderFilterTags();
  renderTagManager();
  

  const el = document.getElementById('list');
  el.innerHTML = filtered.map(b=>`
    <div class="card">
      <div><b>${b.title}</b></div>
      <div style="font-size:12px;color:#666">${getSeriesName(b.seriesId)}</div>

      <div class="row">
 ${tagMaster.map(t=>{
  const on = (b.tags||[]).includes(t.id);

  return `
    <span class="tag ${on?'on':''}"
      onclick="toggleTag(${b.id}, '${t.id}')">
      ${t.name}
    </span>
  `;
}).join('')}
      </div>
      
     

      <textarea onchange="updateMemo(${b.id}, this.value)">${b.memo||''}</textarea>

      <!-- シリーズ変更 -->
      <select onchange="changeSeries(${b.id}, this.value)">
        <option value="">シリーズなし</option>
        ${series.map(s=>`
          <option value="${s.id}" ${b.seriesId===s.id?'selected':''}>
            ${s.name}
          </option>
        `).join('')}
      </select>

      <div class="row">
        <button onclick="toggleFav(${b.id})">${b.fav?'★':'☆'}</button>
        <button onclick="removeBook(${b.id})">削除</button>
      </div>
    </div>
  `).join('');
}

function renderSeriesSelect(){
  const sel = document.getElementById('seriesSelect');
  sel.innerHTML = '<option value="">シリーズなし</option>' +
    series.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function getSeriesName(id){
  const s = series.find(x=>x.id===id);
  return s ? 'シリーズ: ' + s.name : '';
}

//タグ絞り込み
function renderFilterTags(){
  const el = document.getElementById('filter-tags');

  el.innerHTML = tagMaster.map(t=>{
    const on = activeTags.includes(t);

    return `
      <span class="tag ${on?'on':''}"
        onclick="toggleFilterTag('${t}')">
        ${t}
      </span>
    `;
  }).join('');
}

//タグ一覧の描画
function renderTagManager(){
  const el = document.getElementById('tag-list');

  el.innerHTML = tagMaster.map(t=>`
    <div class="row">
      <span class="tag">${t.name}</span>
      <button onclick="deleteTag('${t.id}')">削除</button>
    </div>
  `).join('');
}




// ===== 操作 =====
function addBook(){
  const title = document.getElementById('title').value.trim();
  const memo = document.getElementById('memo').value;
  const seriesId = document.getElementById('seriesSelect').value;

  if(!title) return;

  books.unshift({
    id: Date.now(),
    title,
    memo,
    tags: [],  //本データ構造？
    fav:false,
    seriesId: seriesId || null
  });

  document.getElementById('title').value='';
  document.getElementById('memo').value='';

  scheduleSave();
  render();
}

function addSeries(){
  const name = document.getElementById('newSeries').value.trim();
  if(!name) return;

  series.push({
    id: 's'+Date.now(),
    name
  });

  document.getElementById('newSeries').value='';
  scheduleSave();
  render();
}

function changeSeries(id, seriesId){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.seriesId = seriesId || null;
  scheduleSave();
}

function removeBook(id){
  books = books.filter(b=>b.id!==id);
  scheduleSave();
  render();
}

function updateMemo(id, val){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.memo = val;
  scheduleSave();
}

function toggleFav(id){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.fav = !b.fav;
  scheduleSave();
  render();
}

function toggleTag(id, tagId){
  const b = books.find(x=>x.id===id);
  if(!b) return;

  if(!b.tags) b.tags = [];

  if(b.tags.includes(tagId)){
    b.tags = b.tags.filter(t=>t!==tagId);
  }else{
    b.tags.push(tagId);
  }

  scheduleSave();
  render();
}

function toggleFilterTag(tag){
  if(activeTags.includes(tag)){
    activeTags = activeTags.filter(t=>t!==tag);
  }else{
    activeTags.push(tag);
  }

  render();
}
function clearFilter(){
  activeTags = [];
  render();
}

//タグ追加
function addTagMaster(){
  const name = document.getElementById('newTagName').value.trim();
  if(!name) return;

  tagMaster.push({
    id: 't'+Date.now(),
    name
  });

  document.getElementById('newTagName').value='';

  scheduleSave();
  render();
}



//タグ削除
function deleteTag(id){

  // タグ削除
  tagMaster = tagMaster.filter(t=>t.id !== id);

  // 本からも消す
  books.forEach(b=>{
    b.tags = (b.tags||[]).filter(t=>t !== id);
  });

  scheduleSave();
  render();
}




// ===== 起動 =====
function init(){
  loadData();
  render();
}

init();

</script>
</body>
</html>
