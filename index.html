<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Reading App 完成版（ローカル）</title>
<style>
body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5}
h1{margin-bottom:10px}
.card{background:#fff;border:1px solid #ddd;padding:10px;margin-bottom:10px;border-radius:6px}
input,textarea{width:100%;margin-top:5px;margin-bottom:5px;padding:6px}
button{padding:6px 10px;margin-top:5px}
.row{display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:3px 6px;border-radius:4px;background:#ddd;font-size:12px}
</style>
</head>
<body>

<h1>読書アプリ（完成版・ローカル保存）</h1>

<div class="card">
  <input id="title" placeholder="タイトル">
  <textarea id="memo" placeholder="メモ"></textarea>
  <button onclick="addBook()">追加</button>
</div>

<div id="list"></div>

<script>
// ===== データ =====
let books = [];
let tagMaster = [];

// ===== 保存 =====
function saveData(){
  localStorage.setItem('readingAppData', JSON.stringify({books, tagMaster}));
}

function loadData(){
  try{
    const d = JSON.parse(localStorage.getItem('readingAppData'));
    if(!d) return;
    books = d.books || [];
    tagMaster = d.tagMaster || [];
  }catch(e){
    books = [];
    tagMaster = [];
  }
}

function scheduleSave(){
  saveData();
}

// ===== UI =====
function render(){
  const el = document.getElementById('list');

  el.innerHTML = books.map(b=>`
    <div class="card">
      <div><b>${b.title}</b></div>

      <textarea onchange="updateMemo(${b.id}, this.value)">${b.memo||''}</textarea>

      <div class="row">
        ${(b.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>

      <input placeholder="タグ追加" onkeydown="addTag(event, ${b.id}, this)">

      <div class="row">
        <button onclick="toggleFav(${b.id})">${b.fav?'★':'☆'}</button>
        <button onclick="removeBook(${b.id})">削除</button>
      </div>
    </div>
  `).join('');
}

// ===== 操作 =====
function addBook(){
  const title = document.getElementById('title').value.trim();
  const memo = document.getElementById('memo').value;

  if(!title) return;

  books.unshift({
    id: Date.now(),
    title,
    memo,
    tags: [],
    fav: false
  });

  document.getElementById('title').value='';
  document.getElementById('memo').value='';

  scheduleSave();
  render();
}

function removeBook(id){
  books = books.filter(b=>b.id!==id);
  scheduleSave();
  render();
}

function updateMemo(id, val){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.memo = val;
  scheduleSave();
}

function toggleFav(id){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.fav = !b.fav;
  scheduleSave();
  render();
}

function addTag(e, id, input){
  if(e.key !== 'Enter') return;

  const val = input.value.trim();
  if(!val) return;

  const b = books.find(x=>x.id===id);
  if(!b) return;

  if(!b.tags.includes(val)){
    b.tags.push(val);
  }

  input.value='';
  scheduleSave();
  render();
}

// ===== 起動 =====
function init(){
  loadData();
  render();
}

init();
</script>

</body>
</html>
