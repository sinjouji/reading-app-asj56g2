<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>読書ログ</title>
<style>
body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5}
.card{background:#fff;border:1px solid #ddd;padding:10px;margin-bottom:10px;border-radius:6px}
input,textarea,select{width:70%;margin-top:5px;margin-bottom:5px;padding:6px}
button{padding:6px 10px;margin-top:5px}
.row{display:flex;gap:5px;flex-wrap:wrap}


.tag{
  padding:2px 6px;
  border-radius:999px;
  font-size:10px;
  cursor:pointer;
  border:1px solid transparent;
  transition: all 0.15s ease;
  user-select:none;
}

/* 未選択 */
.tag{
  background:#fff;
  color:#666;
  border-color:#ddd;
}

/* 選択中 */
.tag.on{
  color:#fff;
  border-color:transparent;
}

/* ホバー */
.tag:hover{
  transform:scale(1.05);
  opacity:0.9;
}

/* 押したとき */
.tag:active{
  transform:scale(0.95);
}
</style>
</head>
<body>

<h1>読書アプリ</h1>
<!--絞り込み-->
<div class="card">
	<div class="row" id="filter-tags"></div>
	<button onclick="clearFilter()">解除</button>
</div>

<!-- 本追加 -->
<div class="card">
  <input id="title" placeholder="タイトル">
  <textarea id="memo" placeholder="メモ"></textarea>
  <select id="seriesSelect"></select>
  <button onclick="addBook()">追加</button>
</div>

<!-- シリーズ追加 -->
<div class="card">
  <input id="newSeries" placeholder="新しいシリーズ名">
  <button onclick="addSeries()">シリーズ作成</button>
</div>

<div id="list"></div>

<!--個別ページエリア-->
<div id="detail" style="display:none"></div>

<!--タグ管理画面-->
<div class="card">
  <h3>タグ管理</h3>

  <div id="tag-list"></div>

  <input id="newTagName" placeholder="タグ名">
  <button onclick="addTagMaster()">追加</button>
</div>


<!--データエクスポート機能-->
<div class="card">
  <h3>データ管理</h3>
  <button onclick="exportData()">エクスポート</button>
  <input type="file" onchange="importData(event)">
</div>


<script>
//==最初の定義付け、初期値入力？==

let books = [];
let series = [];
let tagMaster = [
	{id:"t1", name:"小説", color:"#67b255"},
	{id:"t2", name:"漫画", color:"#ff9800"}
];
let filterMode = "OR";
let activeTags = [];

// ===== 保存 =====
function saveData(){
  localStorage.setItem('readingAppData',
  JSON.stringify({books, series, tagMaster}));
}

function loadData(){
  try{
    const d = JSON.parse(localStorage.getItem('readingAppData'));
    if(!d) return;
    books = d.books || [];
    series = d.series || [];
    tagMaster = d.tagMaster || tagMaster;
  }catch(e){
    books = [];
    series = [];
  }
}
function scheduleSave(){
  saveData();
}

// ===== UI(render:描画) =====
function render(){

	renderSeriesSelect();
	renderFilterTags();
	renderTagManager();

const filtered = books.filter(b=>{
  if(activeTags.length === 0) return true;
  return activeTags.some(tagId => (b.tags||[]).includes(tagId)); //OR
  
});



  const el = document.getElementById('list');
  el.innerHTML = filtered.map(b=>`
    <div class="card" onclick="openDetail(${b.id})">
      <div><b>${b.title}</b>  <div>${b.status || "未読"}</div></div>
      <div style="font-size:12px;color:#666">${getSeriesName(b.seriesId)}</div>

      <div class="row">
 ${tagMaster.map(t=>{
  const on = (b.tags||[]).includes(t.id);

  if(!on) return '';

  return `
    <span class="tag"
      style="background:${t.color};color:#fff;">
      ${t.name}
    </span>
  `;
}).join('')}
      </div>


 

//==タグ一覧の描画==
function renderTagManager(){
  const el = document.getElementById('tag-list');

  el.innerHTML = tagMaster.map(t=>`
    <div class="row">
      <span class="tag"
  style="
    background:${t.color};
    color:#fff;
    border:none;
  ">
  ${t.name}
</span>
      <button onclick="deleteTag('${t.id}')">削除</button>
    </div>
  `).join('');
}

//==タグ絞り込み==
function renderFilterTags(){
  const el = document.getElementById('filter-tags');

  el.innerHTML = tagMaster.map(t=>{
    const on = activeTags.includes(t.id);

    return `
  <span class="tag ${on?'on':''}"
    style="
      background:${on ? t.color : '#fff'};
      color:${on ? '#fff' : t.color};
      border:1px solid ${t.color};
    "
    onclick="toggleFilterTag('${t.id}')">
    ${t.name}
  </span>
`;
  }).join('');
}


// ===== 操作 =====
function addBook(){
  const title = document.getElementById('title').value.trim();
  const memo = document.getElementById('memo').value;
  const seriesId = document.getElementById('seriesSelect').value;

  if(!title) return;

  books.unshift({
    id: Date.now(),
    title,
    memo,
    tags: [],
    fav:false,
    seriesId: seriesId || null,
    status: "unread"
  });

  document.getElementById('title').value='';
  document.getElementById('memo').value='';

  scheduleSave();
  render();
}

function addSeries(){
  const name = document.getElementById('newSeries').value.trim();
  if(!name) return;
  series.push({
    id: 's'+Date.now(),
    name
  });

  document.getElementById('newSeries').value='';
  scheduleSave();
  render();
}

function changeSeries(id, seriesId){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.seriesId = seriesId || null;
  scheduleSave();
}

function removeBook(id){
  books = books.filter(b=>b.id!==id);
  scheduleSave();
  render();
}

function updateMemo(id, val){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.memo = val;
  scheduleSave();
}

function toggleFav(id){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.fav = !b.fav;
  scheduleSave();
  render();
}

function toggleTag(id, tagId){
  const b = books.find(x=>x.id===id);
  if(!b) return;

  if(!b.tags) b.tags = [];

  if(b.tags.includes(tagId)){
    b.tags = b.tags.filter(t=>t!==tagId);
  }else{
    b.tags.push(tagId);
  }

  scheduleSave();
  render();
}

//==タグフィルター==

function toggleFilterTag(tagId){
  if(activeTags.includes(tagId)){
    activeTags = activeTags.filter(t=>t!==tagId);
  }else{
    activeTags.push(tagId);
  }

  render();
}

function clearFilter(){
  activeTags = [];
  render();
}

//タグ追加
function addTagMaster(){
  const name = document.getElementById('newTagName').value.trim();
  if(!name) return;

  tagMaster.push({
  id: 't'+Date.now(),
  name,
  color: "#67b255"
});

  document.getElementById('newTagName').value='';

  scheduleSave();
  render();
}



//タグ削除
function deleteTag(id){

  // タグ削除
  tagMaster = tagMaster.filter(t=>t.id !== id);

  // 本からも消す
  books.forEach(b=>{
    b.tags = (b.tags||[]).filter(t=>t !== id);
  });

  scheduleSave();
  render();
}


//エクスポート
function exportData(){
  const data = {
    books,
    series,
    tagMaster
  };

  const json = JSON.stringify(data, null, 2);

  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "reading-app-backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

//インポート
function importData(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(){
    try{
      const data = JSON.parse(reader.result);

      books = data.books || [];
      series = data.series || [];
      tagMaster = data.tagMaster || [];

      scheduleSave();
      render();

      alert("復元完了！");
    }catch(err){
      alert("読み込み失敗");
    }
  };

  reader.readAsText(file);
}


//個別ページ詳細
function openDetail(id){
  const b = books.find(x=>x.id===id);
  if(!b) return;

  currentBook = JSON.parse(JSON.stringify(b)); // コピー

  document.getElementById('list').style.display = 'none';
  document.getElementById('detail').style.display = 'block';

  document.getElementById('detail').innerHTML = `
    <div class="card">

      <button onclick="closeDetail()">← 戻る</button>

      <h2>${currentBook.title}</h2>

      <!-- ステータス -->
      <select id="status">
        <option value="unread">未読</option>
        <option value="reading">読書中</option>
        <option value="done">読了</option>
      </select>

      <!-- タグ -->
      <div class="row">
        ${tagMaster.map(t=>{
          const on = (currentBook.tags||[]).includes(t.id);

          return `
            <span class="tag ${on?'on':''}"
              style="background:${on ? t.color : '#fff'};
                     color:${on ? '#fff' : t.color};
                     border:1px solid ${t.color};"
              onclick="toggleDetailTag('${t.id}')">
              ${t.name}
            </span>
          `;
        }).join('')}
      </div>

      <!-- メモ -->
      <textarea id="detailMemo">${currentBook.memo||''}</textarea>

      <!-- シリーズ -->
      <select id="detailSeries">
        <option value="">シリーズなし</option>
        ${series.map(s=>`
          <option value="${s.id}">
            ${s.name}
          </option>
        `).join('')}
      </select>

      <!-- お気に入り -->
      <button onclick="toggleDetailFav()">
        ${currentBook.fav?'★お気に入り':'☆お気に入り'}
      </button>

      <br><br>

      <button onclick="saveDetail()">保存</button>
      <button onclick="deleteDetail()">削除</button>

    </div>
  `;

  // 初期値セット
  document.getElementById('status').value = currentBook.status || "unread";
  document.getElementById('detailSeries').value = currentBook.seriesId || "";
}


//一覧に戻る
function closeDetail(){
  document.getElementById('list').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
}


//タグ（詳細）
function toggleDetailTag(tagId){
  if(!currentBook.tags) currentBook.tags = [];

  if(currentBook.tags.includes(tagId)){
    currentBook.tags = currentBook.tags.filter(t=>t!==tagId);
  }else{
    currentBook.tags.push(tagId);
  }

  openDetail(currentBook.id); // 再描画
}

//お気に入り（詳細）
function toggleDetailFav(){
  currentBook.fav = !currentBook.fav;
  openDetail(currentBook.id);
}


//保存（詳細）
function saveDetail(){
  const b = books.find(x=>x.id===currentBook.id);
  if(!b) return;

  b.memo = document.getElementById('detailMemo').value;
  b.seriesId = document.getElementById('detailSeries').value || null;
  b.status = document.getElementById('status').value;
  b.tags = currentBook.tags;
  b.fav = currentBook.fav;

  scheduleSave();
  closeDetail();
  render();
}


//削除（詳細）
function deleteDetail(){
  if(!confirm("削除する？")) return;

  books = books.filter(b=>b.id!==currentBook.id);

  scheduleSave();
  closeDetail();
  render();
}



// ===== 起動 =====
function init(){
  loadData();
  render();
}

init();

</script>
</body>
</html>
